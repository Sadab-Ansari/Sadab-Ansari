name: Profile Metrics - Languages
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Languages
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sadab-Ansari
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_title: no
          plugin_languages_limit: 10
          plugin_languages_categories: yes, markup, data
          plugin_languages_colors: github
